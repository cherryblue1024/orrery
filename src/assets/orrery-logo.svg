<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <title>Orrery logo</title>
  <defs>
    <radialGradient id="orrery-sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 59) rotate(90) scale(30)">
      <stop offset="0" stop-color="#FFF7D6" />
      <stop offset="0.58" stop-color="#E9C979" />
      <stop offset="1" stop-color="#9D6E2E" />
    </radialGradient>
    <linearGradient id="orrery-ring" x1="23" y1="30" x2="105" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2DE9F" />
      <stop offset="0.45" stop-color="#C89A46" />
      <stop offset="1" stop-color="#79501F" />
    </linearGradient>
    <linearGradient id="orrery-ring-soft" x1="96" y1="24" x2="39" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF1BF" />
      <stop offset="0.5" stop-color="#D0A85A" />
      <stop offset="1" stop-color="#8C5C26" />
    </linearGradient>
    <linearGradient id="orrery-base" x1="40" y1="87" x2="88" y2="87" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#705027" />
      <stop offset="0.5" stop-color="#D7AF62" />
      <stop offset="1" stop-color="#6F4E24" />
    </linearGradient>
    <filter id="orrery-glow" x="42" y="37" width="44" height="44" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix" />
      <feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape" />
      <feGaussianBlur stdDeviation="4" result="effect1_foregroundBlur_1_1" />
    </filter>
  </defs>

  <g opacity="0.24" filter="url(#orrery-glow)">
    <circle cx="64" cy="59" r="14" fill="#F3CF7A" />
  </g>

  <ellipse
    cx="64"
    cy="59"
    rx="42"
    ry="18"
    transform="rotate(-18 64 59)"
    stroke="url(#orrery-ring)"
    stroke-width="4"
  />
  <ellipse
    cx="64"
    cy="59"
    rx="27"
    ry="43"
    transform="rotate(23 64 59)"
    stroke="url(#orrery-ring-soft)"
    stroke-width="3.5"
    opacity="0.92"
  />
  <path
    d="M64 73.5V90"
    stroke="url(#orrery-ring)"
    stroke-width="3.5"
    stroke-linecap="round"
  />
  <path
    d="M47 96H81"
    stroke="url(#orrery-base)"
    stroke-width="5"
    stroke-linecap="round"
  />
  <path
    d="M40 103H88"
    stroke="url(#orrery-base)"
    stroke-width="5"
    stroke-linecap="round"
    opacity="0.9"
  />

  <circle cx="64" cy="59" r="12" fill="url(#orrery-sun)" />
  <circle cx="95" cy="48" r="4.5" fill="#E8D2A0" />
  <circle cx="56" cy="20" r="3.5" fill="#F5E7BE" opacity="0.95" />
</svg>
